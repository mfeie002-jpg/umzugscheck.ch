name: CI

on:
  push:
    branches:
      - main
      - loop/**   # alle deine Loop-Branches
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      # Falls beim Build ENV-Variablen erwartet werden:
      SUPABASE_URL: ""
      SUPABASE_KEY: ""

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build




        
        