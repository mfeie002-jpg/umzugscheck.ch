name: Funnel Testing CI

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      num_runs:
        description: 'Number of test runs'
        required: false
        default: '20'
      seed:
        description: 'Random seed (leave empty for timestamp)'
        required: false

jobs:
  funnel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/funnel-testing/package-lock.json
      
      - name: Install dependencies
        working-directory: tools/funnel-testing
        run: |
          npm ci
          npx playwright install --with-deps chromium
      
      - name: Set seed
        id: seed
        run: |
          if [ -z "${{ github.event.inputs.seed }}" ]; then
            echo "seed=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "seed=${{ github.event.inputs.seed }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Run funnel tests
        working-directory: tools/funnel-testing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          NUM_RUNS=${{ github.event.inputs.num_runs || 20 }}
          SEED="${{ steps.seed.outputs.seed }}"
          
          # Generate configs
          for i in $(seq 1 $NUM_RUNS); do
            npm run dispatch -- --seed "${SEED}_$i"
          done
          
          # Run tests (4 at a time to avoid rate limits)
          RUN_IDS=$(find runs -maxdepth 1 -type d -name '*-*-*-*-*' | xargs -n 1 basename)
          echo "$RUN_IDS" | xargs -P 4 -I {} npm run run -- --run_id {}
          
          # Generate reports
          npm run report
      
      - name: Check for blockers
        working-directory: tools/funnel-testing
        run: |
          BLOCKER_COUNT=$(jq '[.[] | select(.verdict == "blocker")] | length' runs/*/result.json 2>/dev/null || echo "0")
          echo "Blocker count: $BLOCKER_COUNT"
          
          if [ "$BLOCKER_COUNT" -gt 5 ]; then
            echo "❌ Too many blockers detected: $BLOCKER_COUNT"
            exit 1
          fi
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: funnel-test-results-${{ github.run_number }}
          path: |
            tools/funnel-testing/reports/
            tools/funnel-testing/runs/*/result.json
            tools/funnel-testing/runs/*/screenshots/
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const leaderboard = fs.readFileSync('tools/funnel-testing/reports/leaderboard.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `## 🧪 Funnel Test Results\n\n${leaderboard}`
            });
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Funnel tests failed - check artifacts for details"
